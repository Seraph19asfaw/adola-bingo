<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { background: #1a052d; color: white; font-family: sans-serif; margin: 0; padding: 10px; }
        .header { display: flex; justify-content: space-between; background: #2a0b4a; padding: 15px; border-radius: 10px; border-bottom: 2px solid #f1c40f; }
        .balance { color: #f1c40f; font-weight: bold; }
        .timer-box { font-size: 2rem; text-align: center; margin: 10px 0; color: #00ff88; }
        .cartela-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; background: #333; padding: 5px; border-radius: 5px; margin-bottom: 15px; }
        .cell { background: #444; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 0.9rem; border-radius: 3px; }
        .cell.marked { background: #2ecc71; animation: pulse 0.5s; }
        .nav-tabs { display: flex; justify-content: space-around; background: #000; position: fixed; bottom: 0; width: 100%; left: 0; padding: 15px 0; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <div class="header">
        <span>Borena DT</span>
        <span class="balance">ETB <span id="bal">0.00</span></span>
    </div>

    <div id="timer" class="timer-box">60s</div>
    <div id="status" style="text-align:center">Waiting for Players...</div>

    <div id="cartela-container"></div>

    <div style="padding: 20px; text-align: center;">
        <button onclick="buyCartelas(1)" style="background:#f1c40f; padding:10px; border-radius:5px;">Buy 1 Cartela (10 ETB)</button>
        <button onclick="promptDeposit()" style="background:#3498db; color:white; padding:10px; border-radius:5px;">Deposit</button>
    </div>

    <div class="nav-tabs">
        <span>Game</span><span>Wallet</span><span>Profile</span>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const socket = io("https://adola-bingo.onrender.com");
        let myGrids = [];

        socket.on('gameUpdate', (gs) => {
            if(gs.status === "WAITING") {
                document.getElementById('timer').innerText = gs.timer + "s";
                document.getElementById('status').innerText = "Next Game Starting...";
            } else {
                document.getElementById('timer').innerText = "LIVE";
                document.getElementById('status').innerText = "Numbers being called!";
            }
        });

        socket.on('numberCalled', (num) => {
            tg.HapticFeedback.impactOccurred('medium');
            const cells = document.querySelectorAll(`.cell[data-num="${num}"]`);
            cells.forEach(c => c.classList.add('marked'));
        });

        function buyCartelas(n) {
            // Deduct balance logic here
            const container = document.getElementById('cartela-container');
            let gridHtml = '<div class="cartela-grid">';
            for(let i=0; i<25; i++) {
                let val = Math.floor(Math.random() * 75) + 1;
                gridHtml += `<div class="cell" data-num="${val}">${val}</div>`;
            }
            gridHtml += '</div>';
            container.innerHTML += gridHtml;
        }

        function promptDeposit() {
            const sms = prompt("Paste Telebirr SMS for 0979240665:");
            if(sms) socket.emit('submitDeposit', { sms, tgId: tg.initDataUnsafe.user.id });
        }
    </script>
</body>
</html>
