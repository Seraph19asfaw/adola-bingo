<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Adola Bingo</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        /* Keeping your styles the same as before */
        body { background-color: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 10px; }
        .header { color: #f1c40f; font-size: 1.5rem; margin-bottom: 10px; }
        #current-call { font-size: 3.5rem; background: #e67e22; width: 90px; height: 90px; line-height: 90px; border-radius: 50%; margin: 15px auto; border: 4px solid #fff; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-width: 350px; margin: 0 auto; background: #333; padding: 10px; border-radius: 10px; }
        .cell { background-color: #444; aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; border-radius: 8px; font-size: 1.1rem; }
        .cell.selected { background-color: #2ecc71; color: white; }
        .btn-call { background: #f1c40f; color: #000; padding: 15px; border-radius: 10px; font-weight: bold; width: 80%; margin-top: 20px; border: none; }
    </style>
</head>
<body>
    <h1 class="header">አዶላ ቢንጎ (Adola)</h1>
    <div id="status">በመጠበቅ ላይ... (Waiting)</div>
    <div id="current-call">--</div>
    
    <div id="bingo-grid" class="grid"></div>

    <button class="btn-call" onclick="requestNumber()">ቁጥር ጥራ (Call Number)</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // PASTE YOUR RENDER URL HERE
        const socket = io("https://adola-bingo.onrender.com");

        socket.on('numberCalled', (num) => {
            document.getElementById('current-call').innerText = num;
            document.getElementById('status').innerText = "ቁጥር ወጥቷል! (Number is out!)";
            tg.HapticFeedback.notificationOccurred('success');
        });

        function requestNumber() {
            socket.emit('drawNumber');
        }

        // Generate the card (same as before)
        function generateCard() {
            const grid = document.getElementById('bingo-grid');
            for(let i=0; i<25; i++) {
                let cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = Math.floor(Math.random() * 75) + 1;
                cell.onclick = () => {
                    cell.classList.toggle('selected');
                    tg.HapticFeedback.impactOccurred('medium');
                };
                grid.appendChild(cell);
            }
        }
        generateCard();
        <div id="deposit-modal" style="display:none; position:fixed; top:20%; left:5%; width:90%; background:#222; padding:20px; border:2px solid gold; border-radius:15px; z-index:1000;">
    <h3>Deposit ETB</h3>
    <p>Transfer to 0979240665 (Mesfin)</p>
    <textarea id="sms-input" placeholder="Paste the confirmation SMS here..." style="width:100%; height:100px; background:#333; color:white; border-radius:8px;"></textarea>
    <br><br>
    <button onclick="sendDeposit()" style="background:green; color:white; width:100%;">SUBMIT TO MESFIN</button>
    <button onclick="document.getElementById('deposit-modal').style.display='none'" style="background:red; color:white; width:100%; margin-top:10px;">CANCEL</button>
</div>

<script>
function promptDeposit() {
    document.getElementById('deposit-modal').style.display = 'block';
}

function sendDeposit() {
    const text = document.getElementById('sms-input').value;
    if(text.length < 10) return alert("Please paste the full SMS");
    
    socket.emit('submitDeposit', {
        smsText: text,
        userName: tg.initDataUnsafe.user.first_name,
        tgId: tg.initDataUnsafe.user.id
    });
    
    document.getElementById('deposit-modal').style.display = 'none';
    tg.showAlert("ጥያቄዎ ተልኳል! Mesfin ሲያረጋግጥ ብሩ ይገባል።");
}
</script>

    </script>
</body>
</html>
